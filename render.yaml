databases:
  - name: libranet-db
    plan: free
    databaseName: libranet
    user: libranet

services:
  # Backend - Go API
  - type: web
    name: libranet-api
    runtime: go
    plan: free
    rootDir: backend
    buildCommand: go build -o bin/server ./cmd/server/
    startCommand: ./bin/server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: libranet-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 24h
      - key: APP_ENV
        value: production
    healthCheckPath: /health

  # Frontend - React Static Site
  - type: web
    name: libranet-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
